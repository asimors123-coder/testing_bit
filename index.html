<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Investment App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="header">
    <div>
      <span class="label">Balance</span>
      <h1><span id="totalCapital">24,085</span> ₪</h1>
    </div>
    <div class="circle">75%</div>
  </header>

  <section class="cards">
    <div class="card">
      <span>מושקע</span>
      <strong id="invested">8,400 ₪</strong>
    </div>
    <div class="card">
      <span>רווח</span>
      <strong class="green">+1,240 ₪</strong>
    </div>
  </section>

  <section class="card big">
    <h3>➕ הוספת פוזיציה</h3>
    <div class="form">
      <input placeholder="מטבע">
      <input placeholder="כמות">
      <input placeholder="מחיר קנייה">
      <input placeholder="TP">
      <input placeholder="SL">
      <button>הוסף</button>
    </div>
  </section>

  <section class="card big">
    <h3>📈 פוזיציות</h3>
    <table>
      <tr>
        <th>מטבע</th>
        <th>קנייה</th>
        <th>TP</th>
      </tr>
      <tr>
        <td>BTC</td>
        <td>42,000</td>
        <td class="green">48,000</td>
      </tr>
    </table>
  </section>

</div>

</body>
</html>
