<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Investment App</title>

<style>
:root {
  --bg:#0b0d12;
  --card:#151923;
  --soft:#1e2433;
  --green:#4dff9f;
  --text:#e8eaf0;
  --muted:#9aa1b2;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle at top,#161a2f,#05070c);
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  color:var(--text);
}

/* APP CONTAINER */
.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header span{
  font-size:13px;
  color:var(--muted);
}

.header h1{
  margin:4px 0 0;
  color:var(--green);
  font-size:32px;
}

.progress{
  width:64px;
  height:64px;
  border-radius:50%;
  background:
    conic-gradient(var(--green) 75%,var(--soft) 0);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:20px;
}

.card{
  background:linear-gradient(180deg,var(--card),var(--soft));
  border-radius:18px;
  padding:16px;
}

.card small{
  color:var(--muted);
  font-size:13px;
}

.card strong{
  display:block;
  margin-top:6px;
  font-size:20px;
  color:var(--green);
}

/* FORM */
.panel{
  background:var(--card);
  border-radius:22px;
  padding:18px;
  margin-top:20px;
}

.panel h3{
  margin-top:0;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input{
  background:#080a11;
  border:1px solid #232a3d;
  border-radius:12px;
  color:var(--text);
  padding:10px;
}

button{
  grid-column:span 2;
  background:linear-gradient(135deg,#4dff9f,#00c873);
  border:none;
  border-radius:14px;
  padding:12px;
  font-weight:bold;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #232a3d;
}

th{
  color:var(--muted);
  font-weight:normal;
}

/* BOTTOM NAV */
.nav{
  position:sticky;
  bottom:10px;
  margin-top:30px;
  background:#111525;
  border-radius:20px;
  padding:12px;
  display:flex;
  justify-content:space-around;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.nav div{
  color:var(--muted);
  font-size:22px;
}

.nav .active{
  color:var(--green);
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div>
      <span>Balance</span>
      <h1>₪ 24,085</h1>
    </div>
    <div class="progress">75%</div>
  </div>

  <div class="stats">
    <div class="card">
      <small>מושקע</small>
      <strong>₪ 8,400</strong>
    </div>
    <div class="card">
      <small>רווח</small>
      <strong>+₪ 1,240</strong>
    </div>
  </div>

  <div class="panel">
    <h3>➕ פוזיציה חדשה</h3>
    <div class="form">
      <input placeholder="מטבע">
      <input placeholder="כמות">
      <input placeholder="מחיר קנייה">
      <input placeholder="TP">
      <input placeholder="SL">
      <button>הוסף</button>
    </div>
  </div>

  <div class="panel">
    <h3>📈 פוזיציות</h3>
    <table>
      <tr>
        <th>מטבע</th><th>קנייה</th><th>TP</th>
      </tr>
      <tr>
        <td>BTC</td><td>42,000</td><td style="color:var(--green)">48,000</td>
      </tr>
    </table>
  </div>

  <div class="nav">
    <div class="active">●</div>
    <div>◼</div>
    <div>▲</div>
  </div>

</div>

</body>
</html>
