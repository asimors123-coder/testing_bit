<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Crypto Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>💎 Portfolio</h2>
    <nav>
      <a class="active">📊 דשבורד</a>
      <a>➕ פוזיציה</a>
      <a>📈 אנליטיקה</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP CARDS -->
    <section class="stats">
      <div class="stat-card">
        <span>💰 הון כולל</span>
        <strong><span id="totalCapital">0</span> ₪</strong>
      </div>
      <div class="stat-card">
        <span>💸 מושקע</span>
        <strong><span id="invested">0</span> ₪</strong>
      </div>
      <div class="stat-card highlight">
        <span>📈 רווח / הפסד</span>
        <strong>0 ₪</strong>
      </div>
    </section>

    <!-- ADD POSITION -->
    <section class="panel">
      <h3>➕ הוספת פוזיציה</h3>
      <div class="form">
        <input id="coin" placeholder="מטבע (BTC)" />
        <input id="amount" type="number" placeholder="כמות" />
        <input id="buyPrice" type="number" placeholder="מחיר קנייה" />
        <input id="tp" type="number" placeholder="Target" />
        <input id="sl" type="number" placeholder="Stop" />
        <input id="note" placeholder="הערה" />
        <button onclick="addPosition()">הוסף פוזיציה</button>
      </div>
    </section>

    <!-- TABLE -->
    <section class="panel">
      <h3>📋 פוזיציות פתוחות</h3>
      <table>
        <thead>
          <tr>
            <th>מטבע</th>
            <th>כמות</th>
            <th>קנייה</th>
            <th>₪ השקעה</th>
            <th>TP</th>
            <th>SL</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="positions"></tbody>
      </table>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
