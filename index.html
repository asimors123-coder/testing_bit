<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
:root{
  --bg:#0b0d12;
  --card:#151923;
  --soft:#1e2433;
  --green:#6cffb0;
  --green-glow:rgba(108,255,176,.4);
  --red:#ff6b6b;
  --text:#e8ebf0;
  --muted:#9aa1b2;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:linear-gradient(180deg,#121628,#05070c);
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  color:var(--text);
}

.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  padding:18px;
  padding-bottom:90px;
}

/* HEADER */
header{
  margin-bottom:20px;
}
header h1{
  margin:0;
  color:var(--green);
  text-shadow:0 0 12px var(--green-glow);
}

/* CARD */
.card{
  background:linear-gradient(180deg,var(--card),var(--soft));
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  padding:10px;
  border-bottom:1px solid #232a3d;
  text-align:center;
}
th{color:var(--muted);font-weight:normal}

.green{color:var(--green)}
.red{color:var(--red)}

/* FILTERS */
.filters{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}
.filters button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#0a0c14;
  color:var(--muted);
}
.filters button.active{
  background:var(--green);
  color:#05110a;
  font-weight:bold;
  box-shadow:0 0 12px var(--green-glow);
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  background:#111525;
  border-radius:22px;
  padding:14px;
  display:flex;
  justify-content:space-around;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.nav button{
  background:none;
  border:none;
  color:var(--muted);
  font-size:16px;
}
.nav button.active{
  color:var(--green);
  text-shadow:0 0 10px var(--green-glow);
  font-weight:bold;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="app">

  <!-- HOME -->
  <section id="home">
    <header>
      <h1>פוזיציות פתוחות</h1>
    </header>

    <div class="card">
      <table>
        <tr>
          <th>נכס</th><th>קנייה</th><th>מחיר</th><th>PnL</th>
        </tr>
        <tr>
          <td>BTC</td>
          <td>42,000</td>
          <td>44,500</td>
          <td class="green">+5.9%</td>
        </tr>
        <tr>
          <td>ETH</td>
          <td>2,200</td>
          <td>2,050</td>
          <td class="red">-6.8%</td>
        </tr>
      </table>
    </div>
  </section>

  <!-- HISTORY -->
  <section id="history" class="hidden">
    <header>
      <h1>היסטוריה</h1>
    </header>

    <div class="filters">
      <button class="active" onclick="filterHistory('all',this)">הכול</button>
      <button onclick="filterHistory('profit',this)">רווח</button>
      <button onclick="filterHistory('loss',this)">הפסד</button>
    </div>

    <div class="card">
      <table id="historyTable">
        <tr>
          <th>נכס</th><th>פעולה</th><th>תוצאה</th>
        </tr>
        <tr data-type="profit">
          <td>BTC</td><td>נמכר</td><td class="green">+2,100₪</td>
        </tr>
        <tr data-type="loss">
          <td>SOL</td><td>נמכר</td><td class="red">-900₪</td>
        </tr>
      </table>
    </div>
  </section>

</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="showPage('home',this)">בית</button>
  <button onclick="showPage('history',this)">היסטוריה</button>
</div>

<script>
function showPage(page,btn){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("history").classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function filterHistory(type,btn){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll("#historyTable tr[data-type]").forEach(row=>{
    row.style.display = (type==="all" || row.dataset.type===type) ? "" : "none";
  });
}
</script>

</body>
</html>
